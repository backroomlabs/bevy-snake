name: Android — Build

# Only runs when manually triggered from the Actions tab.
on:
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: 28.1.13356709

jobs:
  build:
    name: Build .so (arm64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (required by Android build tools & Gradle) ─────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # ── Android SDK + NDK ────────────────────────────────────────────────────
      - name: Install Android NDK
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust (stable + Android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-android-

      # ── cargo-ndk ────────────────────────────────────────────────────────────
      # cargo-ndk cross-compiles the cdylib and places the .so in jniLibs/
      # so Gradle can pick it up.
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build .so
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: |
          cargo ndk \
            -t arm64-v8a \
            -P 26 \
            -o android/app/src/main/jniLibs \
            build --lib --release \
            --features bevy/android-game-activity

      # ── Package APK with Gradle ──────────────────────────────────────────────
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # ── Artifact ─────────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bevy-snake-android
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14
