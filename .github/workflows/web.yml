name: Web — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent deployment so in-progress runs are cancelled.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────────────────
      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache Cargo registry and build artifacts for faster subsequent runs
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-web-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-web-

      # ── Trunk ───────────────────────────────────────────────────────────────
      # trunk compiles Rust → WASM and produces a self-contained dist/ folder.
      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build (release)
        run: trunk build --release

      # ── Upload artifact (all runs) ──────────────────────────────────────────
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7

      # ── Deploy to GitHub Pages (main branch only) ───────────────────────────
      # Requires: repo Settings → Pages → Source = "GitHub Actions"
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
