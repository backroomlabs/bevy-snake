<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bevy Snake</title>

  <!-- trunk replaces this tag with the compiled WASM + JS loader -->
  <!-- data-wasm-opt="0" disables wasm-opt entirely. Without it, trunk still runs
       wasm-opt at its default level (-O) in release mode, and its bundled binary
       (binaryen v123) rejects the bulk-memory and non-trapping-float-to-int
       features that rustc emits by default. rustc --release already applies
       opt-level=3, so skipping wasm-opt only costs a little extra size. -->
  <link data-trunk rel="rust" data-bin="bevy-snake" data-wasm-opt="0" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none; /* prevent browser scroll-on-swipe */
    }

    canvas {
      display: block;
      max-width: 100vmin;
      max-height: 100vmin;
    }
  </style>
</head>
<body>
  <!-- Bevy creates and injects its own canvas into the body -->
</body>
</html>
